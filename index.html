  <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; width: 100%; }

body {
  font-family: 'Outfit', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: auto;
}

body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: url('gambar\\1.jpeg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  z-index: -2;
  pointer-events: none;
}

body::after {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(10, 10, 26, 0.85);
  z-index: -1;
  pointer-events: none;
}

#app { position: relative; z-index: 1; width: 100%; }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-12px); }
  40% { transform: translateX(12px); }
  60% { transform: translateX(-8px); }
  80% { transform: translateX(8px); }
}
@keyframes glow-pulse {
  0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 170, 0.3); }
  50% { box-shadow: 0 0 40px rgba(0, 255, 170, 0.7), 0 0 80px rgba(0, 255, 170, 0.3); }
}
@keyframes pop-in {
  0% { transform: scale(0.3); opacity: 0; }
  60% { transform: scale(1.15); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
@keyframes confetti-fall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(60px) rotate(360deg); opacity: 0; }
}

.animate-fadeInUp { animation: fadeInUp 0.5s ease forwards; }
.animate-shake { animation: shake 0.5s ease; }
.animate-glow { animation: glow-pulse 1s ease; }
.animate-pop { animation: pop-in 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards; }
.animate-float { animation: float 3s ease-in-out infinite; }

.delay-1 { animation-delay: 0.1s; opacity: 0; }
.delay-2 { animation-delay: 0.2s; opacity: 0; }
.delay-3 { animation-delay: 0.3s; opacity: 0; }
.delay-4 { animation-delay: 0.4s; opacity: 0; }

.neon-text {
  text-shadow: 0 0 10px rgba(0, 255, 170, 0.5), 0 0 40px rgba(0, 255, 170, 0.2);
}
.neon-pink {
  text-shadow: 0 0 10px rgba(255, 100, 200, 0.5), 0 0 40px rgba(255, 100, 200, 0.2);
}

.glass {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.progress-track {
  background: rgba(255, 255, 255, 0.08);
  border-radius: 999px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, #00ffaa, #00ccff);
  transition: width 0.5s ease;
}

.quiz-input {
  background: rgba(255, 255, 255, 0.06);
  border: 2px solid rgba(255, 255, 255, 0.15);
  color: #fff;
  font-family: 'Space Mono', monospace;
  transition: all 0.3s ease;
}
.quiz-input:focus {
  outline: none;
  border-color: #00ffaa;
  box-shadow: 0 0 20px rgba(0, 255, 170, 0.2);
}
.quiz-input::placeholder { color: rgba(255, 255, 255, 0.3); }

.btn-answer {
  background: linear-gradient(135deg, #00ffaa, #00ccff);
  color: #0a0a1a;
  font-weight: 700;
  letter-spacing: 0.05em;
  transition: all 0.3s ease;
}
.btn-answer:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0, 255, 170, 0.4);
}
.btn-answer:active { transform: translateY(0); }
.btn-answer:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.cat-btn {
  background: rgba(255, 255, 255, 0.05);
  border: 2px solid rgba(255, 255, 255, 0.12);
  color: #fff;
  transition: all 0.3s ease;
}
.cat-btn:hover {
  border-color: #00ffaa;
  background: rgba(0, 255, 170, 0.08);
  transform: translateY(-3px);
  box-shadow: 0 10px 30px rgba(0, 255, 170, 0.15);
}

.feedback-overlay {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  pointer-events: none;
}
.feedback-emoji {
  font-size: 5rem;
  animation: pop-in 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards;
}

.lb-row {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.06);
}
.lb-row:nth-child(1) { border-left: 3px solid #ffd700; }
.lb-row:nth-child(2) { border-left: 3px solid #c0c0c0; }
.lb-row:nth-child(3) { border-left: 3px solid #cd7f32; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
</style>

  <script>

const QUESTIONS = {
  fill: [
    { q: "Whose book is this?\nIt is ______ (my)", a: "mine" },
    { q: "Whose bag is that?\nIt is ______ (she)", a: "hers" },
    { q: "This is my sister's bag.\nThat bag is ______.", a: "hers" },
    { q: "These are Rudi and Beni's books. The books are ______.", a: "theirs" }
  ],
  choose: [
    { q: "This pen is (my / mine)", a: "mine" },
    { q: "These books are (their / theirs)", a: "theirs" },
    { q: "This is not your pen. It is (my / mine).", a: "mine" },
    { q: "That house belongs to them. It is (their / theirs).", a: "theirs" }
  ]
};

let currentCategory = '';
let questions = [];
let currentIndex = 0;
let score = 0;
let correctCount = 0;
let wrongCount = 0;
let isMuted = false;
let answered = false;

const audioMenu = document.getElementById('audioMenu');
const audioBacksound = document.getElementById('audioBacksound');
const audioCorrect = document.getElementById('audioCorrect');
const audioWrong = document.getElementById('audioWrong');

function playAudio(el) {
  if (isMuted) return;
  try { el.currentTime = 0; el.play().catch(() => {}); } catch(e) {}
}
function stopAudio(el) {
  try { el.pause(); el.currentTime = 0; } catch(e) {}
}
function toggleMute() {
  isMuted = !isMuted;
  document.getElementById('muteIcon').setAttribute('data-lucide', isMuted ? 'volume-x' : 'volume-2');
  lucide.createIcons();
  if (isMuted) { audioMenu.pause(); audioBacksound.pause(); }
  else { }
}

function showScreen(name) {
  ['Menu','Leaderboard','Quiz','Result'].forEach(s => {
    const el = document.getElementById('screen' + s);
    el.classList.add('hidden');
    el.classList.remove('flex');
  });
  const target = document.getElementById('screen' + name.charAt(0).toUpperCase() + name.slice(1));
  target.classList.remove('hidden');
  target.classList.add('flex');

  stopAudio(audioMenu);
  stopAudio(audioBacksound);

  if (name === 'menu' || name === 'leaderboard' || name === 'result') {
    playAudio(audioMenu);
  }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame(cat) {
  currentCategory = cat;
  questions = shuffle(QUESTIONS[cat]);
  currentIndex = 0;
  score = 0;
  correctCount = 0;
  wrongCount = 0;

  showScreen('quiz');
  stopAudio(audioMenu);
  playAudio(audioBacksound);

  document.getElementById('qCategory').textContent = cat === 'fill' ? 'Fill the Blank' : 'Choose Correct';
  document.getElementById('btnRetry').onclick = () => startGame(currentCategory);

  loadQuestion();
}

function loadQuestion() {
  answered = false;
  const total = questions.length;
  const q = questions[currentIndex];

  document.getElementById('qNum').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('qPercent').textContent = `${Math.round((currentIndex / total) * 100)}%`;
  document.getElementById('qProgress').style.width = `${(currentIndex / total) * 100}%`;
  document.getElementById('qScore').textContent = score;

  document.getElementById('qText').innerHTML = q.q.replace(/\n/g, '<br>');

  const input = document.getElementById('answerInput');
  input.value = '';
  input.disabled = false;
  input.focus();
  document.getElementById('btnJawab').disabled = false;

  document.getElementById('feedbackArea').classList.add('hidden');

  const card = document.getElementById('questionCard');
  card.classList.remove('animate-fadeInUp', 'animate-shake', 'animate-glow');
  void card.offsetWidth;
  card.classList.add('animate-fadeInUp');
}

function submitAnswer() {
  if (answered) return;
  answered = true;

  const input = document.getElementById('answerInput');
  const userAnswer = input.value.trim().toLowerCase();
  const correctAnswer = questions[currentIndex].a.toLowerCase();
  const isCorrect = userAnswer === correctAnswer;

  input.disabled = true;
  document.getElementById('btnJawab').disabled = true;

  const card = document.getElementById('questionCard');
  const feedbackArea = document.getElementById('feedbackArea');

  if (isCorrect) {
    score += 25;
    correctCount++;
    document.getElementById('qScore').textContent = score;

    card.classList.add('animate-glow');
    playAudio(audioCorrect);
    showFeedbackEmoji('✔️ 😆');

    setTimeout(() => nextQuestion(), 1200);
  } else {
    wrongCount++;
    card.classList.add('animate-shake');
    playAudio(audioWrong);
    showFeedbackEmoji('❌ 😢');
    feedbackArea.classList.remove('hidden');
    feedbackArea.innerHTML = `<p class="text-red-400 text-sm mb-1">Incorrect!</p><p class="text-emerald-300 font-bold text-lg" style="font-family:'Space Mono',monospace;">Correct: ${questions[currentIndex].a}</p>`;
    setTimeout(() => nextQuestion(), 2000);
  }
}

function showFeedbackEmoji(emoji) {
  const overlay = document.getElementById('feedbackOverlay');
  const el = document.getElementById('feedbackEmoji');
  el.textContent = emoji;
  overlay.classList.remove('hidden');
  el.style.animation = 'none';
  void el.offsetWidth;
  el.style.animation = '';
  setTimeout(() => overlay.classList.add('hidden'), 1000);
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= questions.length) {
    endGame();
  } else {
    loadQuestion();
  }
}

function endGame() {
  stopAudio(audioBacksound);

  let emoji, grade;
  if (score === 100) { emoji = '🏆'; grade = 'Perfect!'; }
  else if (score >= 75) { emoji = '😄'; grade = 'Great!'; }
  else if (score >= 50) { emoji = '🙂'; grade = 'Good!'; }
  else { emoji = '😢'; grade = 'Try Again'; }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultGrade').textContent = grade;
  document.getElementById('rScore').textContent = score;
  document.getElementById('rCorrect').textContent = correctCount;
  document.getElementById('rWrong').textContent = wrongCount;

  saveScore(currentCategory, score);

  showScreen('result');
}

function saveScore(cat, sc) {
  const key = 'quiz_lb_' + cat;
  let scores = JSON.parse(localStorage.getItem(key) || '[]');
  scores.push({ score: sc, date: new Date().toLocaleDateString() });
  scores.sort((a, b) => b.score - a.score);
  scores = scores.slice(0, 5);
  localStorage.setItem(key, JSON.stringify(scores));
}

function getScores(cat) {
  return JSON.parse(localStorage.getItem('quiz_lb_' + cat) || '[]');
}

function toggleLeaderboard() {
  showScreen('leaderboard');
  renderLeaderboard('fill', document.getElementById('lbFill'));
  renderLeaderboard('choose', document.getElementById('lbChoose'));
}

function renderLeaderboard(cat, container) {
  const scores = getScores(cat);
  const label = cat === 'fill' ? '📝 Fill the Blank' : '📝 Choose Correct';
  let html = `<p class="text-sm text-white/40 uppercase tracking-widest mb-2 mt-4">${label}</p>`;
  if (scores.length === 0) {
    html += `<p class="text-white/20 text-sm py-3">No scores yet</p>`;
  } else {
    scores.forEach((s, i) => {
      const medals = ['🥇','🥈','🥉'];
      html += `<div class="lb-row rounded-xl py-3 px-4 mb-2 flex items-center justify-between">
        <span class="text-white/60 text-sm">${medals[i] || (i+1+'.')} <span class="ml-2 text-white/30 text-xs">${s.date}</span></span>
        <span class="font-bold text-emerald-300 font-mono">${s.score}</span>
      </div>`;
    });
  }
  container.innerHTML = html;
}

function quitQuiz() {
  stopAudio(audioBacksound);
  showScreen('menu');
}

document.getElementById('answerInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') submitAnswer();
});

const defaultConfig = {
  game_title: 'Possessive<br>Pronoun Quiz',
  subtitle_text: 'Master English Grammar — Have Fun!',
  background_color: '#0a0a1a',
  surface_color: 'rgba(255,255,255,0.05)',
  text_color: '#ffffff',
  accent_color: '#00ffaa',
  secondary_action_color: '#00ccff',
  font_family: 'Outfit',
  font_size: 16
};

function applyConfig(config) {
  const title = config.game_title || defaultConfig.game_title;
  const subtitle = config.subtitle_text || defaultConfig.subtitle_text;
  const font = config.font_family || defaultConfig.font_family;
  const baseSize = config.font_size || defaultConfig.font_size;
  const bg = config.background_color || defaultConfig.background_color;
  const txt = config.text_color || defaultConfig.text_color;
  const accent = config.accent_color || defaultConfig.accent_color;
  const surface = config.surface_color || defaultConfig.surface_color;
  const secondary = config.secondary_action_color || defaultConfig.secondary_action_color;

  document.getElementById('titleEl').innerHTML = title;
  document.getElementById('subtitleEl').textContent = subtitle;

  document.body.style.fontFamily = `${font}, Outfit, sans-serif`;
  document.body.style.fontSize = `${baseSize}px`;
  document.body.style.backgroundColor = bg;
  document.body.style.color = txt;

  document.documentElement.style.setProperty('--accent', accent);
}

if (window.elementSdk) {
  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (config) => { applyConfig(config); },
    mapToCapabilities: (config) => ({
      recolorables: [
        { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); }},
        { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); }},
        { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); }},
        { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); }},
        { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); }}
      ],
      borderables: [],
      fontEditable: {
        get: () => config.font_family || defaultConfig.font_family,
        set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
      },
      fontSizeable: {
        get: () => config.font_size || defaultConfig.font_size,
        set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
      }
    }),
    mapToEditPanelValues: (config) => new Map([
      ['game_title', config.game_title || defaultConfig.game_title],
      ['subtitle_text', config.subtitle_text || defaultConfig.subtitle_text]
    ])
  });
}

document.addEventListener('click', function initAudio() {
  playAudio(audioMenu);
  document.removeEventListener('click', initAudio);
